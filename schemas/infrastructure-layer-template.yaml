# Cloud Infrastructure Stack Template
#
# Abstract template for the multi-layer cloud deployment of an MCP tool
# access system. Defines the layer decomposition, resource categories,
# and configuration surface that apply regardless of the specific cloud
# provider or infrastructure framework.
#
# Replace {{placeholders}} with environment-specific values.
# This is a structural template — not executable configuration.

deployment:
  framework: "{{infrastructure_framework}} (e.g., CDK, Terraform, Pulumi, CloudFormation)"
  region: configurable (single-region deployment)
  account: configurable
  environment_types: [development, staging, production]

# -----------------------------------------------------------------------
# Layer Decomposition
# -----------------------------------------------------------------------
# The infrastructure is split into four layers by resource lifecycle
# and change frequency. This ensures that a change to compute configuration
# does not redeploy networking, and vice versa.

layers:

  # -------------------------------------------------------------------
  # Layer 1: Networking — network and identity
  # -------------------------------------------------------------------
  - name: NetworkingLayer
    change_frequency: rare
    description: >
      Shared networking and identity resources. Deployed once per
      environment. All other layers depend on this for network and
      role references.
    resources:
      virtual_network:
        description: >
          Isolated network with private and public subnets.
          Private subnets host compute and storage; public subnets
          host NAT/egress and load balancers if needed.
        config_parameters:
          address_space: "{{cidr_block}}"
          availability_zones: "{{az_count}} (2+ for HA)"
          nat_gateways: "{{nat_count}} (1 for cost; 2+ for HA)"

      security_groups:
        description: >
          Network access control. At minimum, two groups:
          one for compute (egress-only) and one for shared
          filesystem (ingress from compute on mount port only).
        rules:
          - name: compute-sg
            ingress: none
            egress: all
          - name: filesystem-sg
            ingress: "mount port (e.g., 2049/NFS) from compute-sg only"
            egress: none

      execution_roles:
        description: >
          Least-privilege roles for compute functions.
          Grant only the specific actions needed.
        permissions:
          - "Read objects from index storage"
          - "Read/write pagination records in key-value store"
          - "Mount shared filesystem (read-only)"

  # -------------------------------------------------------------------
  # Layer 2: Data — durable and hot-cache storage
  # -------------------------------------------------------------------
  - name: DataLayer
    depends_on: [NetworkingLayer]
    change_frequency: low
    description: >
      Data plane resources. Separates durable storage (for index
      archival) from hot-cache storage (for low-latency compute access).
    resources:
      durable_storage:
        purpose: "Long-term storage for search indexes or document corpora"
        requirements:
          - Versioning enabled (rollback capability)
          - Encryption at rest
          - Lifecycle rules (archive old versions)
        examples: "Object storage (S3, GCS, Azure Blob)"

      hot_cache:
        purpose: >
          Low-latency shared storage accessible by compute functions.
          Eliminates cold-start data download by keeping indexes
          pre-loaded on a mounted filesystem.
        requirements:
          - Shared access across concurrent compute invocations
          - Encryption at rest and in transit
          - Mount targets in private subnets
        examples: "Shared filesystem (EFS, Filestore, Azure Files)"

      replication_task:
        purpose: "Sync data from durable storage to hot cache on a schedule"
        config_parameters:
          schedule: "{{sync_interval}} (e.g., hourly)"
          verification: "checksum on transferred files"
        examples: "DataSync, rsync cron, Storage Transfer Service"

  # -------------------------------------------------------------------
  # Layer 3: Processing — serverless request handling
  # -------------------------------------------------------------------
  - name: ProcessingLayer
    depends_on: [NetworkingLayer, DataLayer]
    change_frequency: moderate
    description: >
      Request plane. Serverless compute running the backend service
      binary, fronted by an API gateway for authentication and routing.
    resources:
      compute_function:
        purpose: "Execute search/retrieval requests"
        config_parameters:
          runtime: "{{language_runtime}} (compiled binary recommended for cold start)"
          architecture: "{{cpu_arch}} (ARM preferred for cost efficiency)"
          memory: "{{memory_mb}} (tune based on index size)"
          timeout: "{{timeout_seconds}}"
          concurrency_limit: "{{max_concurrent}}"
          filesystem_mount: "Hot cache mounted at {{mount_path}}"
          environment:
            INDEX_PATH: "{{mount_path}}"
            PAGINATION_TABLE: "{{kv_store_name}}"
            LOG_LEVEL: "info"
        examples: "Lambda, Cloud Functions, Cloud Run, Azure Functions"

      api_gateway:
        purpose: "Authentication, rate limiting, and request routing"
        config_parameters:
          auth_method: "{{auth_method}} (e.g., cloud-native IAM, JWT, mTLS)"
          rate_limit: "{{requests_per_second}}"
          burst_limit: "{{burst_requests}}"
          routes: "Map each backend endpoint to the compute function"
        examples: "API Gateway, Cloud Endpoints, Azure API Management"

      pagination_store:
        purpose: "Store pagination cursors with automatic TTL cleanup"
        config_parameters:
          key: "cursor_id (string)"
          ttl: "{{cursor_ttl}} (e.g., 15 minutes)"
          billing: "on-demand / pay-per-request"
        examples: "Key-value store with TTL (DynamoDB, Redis, Firestore)"

  # -------------------------------------------------------------------
  # Layer 4: Access Control — external client access (optional)
  # -------------------------------------------------------------------
  - name: AccessControlLayer
    depends_on: [ProcessingLayer]
    change_frequency: low
    description: >
      Access control for external agent platforms that cannot use
      cloud-native authentication directly. Only needed when third-party
      clients require token-based access.
    resources:
      token_authorizer:
        purpose: "Validate bearer tokens and map to internal identity"
        config_parameters:
          grant_type: client_credentials
          scopes: "{{allowed_scopes}} (e.g., search:read, docs:read)"
        examples: "OAuth2 authorizer, JWT validator"

      usage_plans:
        purpose: "Per-client rate limiting and quota enforcement"
        config_parameters:
          rate_limit: "{{client_rps}}"
          burst_limit: "{{client_burst}}"
          daily_quota: "{{client_daily_quota}}"

      client_keys:
        purpose: "Client identification for usage tracking and revocation"
        config_parameters:
          per_client: true
          rotation: "manual or scheduled"

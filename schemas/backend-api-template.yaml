# Backend Service API Template
#
# Abstract template for the REST API that sits between MCP servers and
# the underlying data/compute engine. This template defines the endpoint
# categories, request/response patterns, and operational concerns that
# apply to any search-domain backend service.
#
# Replace {{placeholders}} with domain-specific values.
# This is a structural template — not an executable specification.

service:
  name: "{{domain}}-service"
  version: "{{semver}}"
  description: >
    Backend REST API wrapping a {{engine_type}} engine.
    Provides search, retrieval, and metadata listing operations.
    Deployed as {{compute_model}} (e.g., serverless function,
    container, standalone process).
  base_path: /
  auth: >
    Enforced at the API gateway layer. The backend service trusts
    the authenticated identity passed through request context.

# -----------------------------------------------------------------------
# Endpoint Categories
# -----------------------------------------------------------------------
# Backend APIs for MCP tool access follow a consistent structure:
#
#   1. Search endpoints    — accept queries, return paginated results
#   2. Metadata endpoints  — list available data sources
#   3. Retrieval endpoints — fetch specific items by identifier
#   4. Health endpoints    — liveness and readiness probes

endpoint_templates:

  # --- Search ---
  - category: search
    endpoints:
      - method: POST
        path: "/search"
        description: >
          Full-text search. Accepts query string, source filters,
          and pagination cursor. Returns ranked results.
        request:
          content_type: application/json
          body:
            query:
              type: string
              required: true
            source_id:
              type: string
              required: true
              description: "Restrict to a specific {{source_type}}"
            filters:
              type: object
              description: "Domain-specific filters (file type, date range, etc.)"
            max_results:
              type: integer
              default: 50
            cursor:
              type: string
              description: Pagination cursor from a previous response
        response:
          status: 200
          body:
            results:
              type: array
              items:
                type: object
                properties:
                  source:
                    type: string
                  location:
                    type: string
                  content:
                    type: string
                    description: Matching content with context
                  relevance:
                    type: number
            total_count:
              type: integer
            next_cursor:
              type: string
              nullable: true
        error_responses:
          - status: 400
            description: Invalid query syntax or missing required fields
          - status: 404
            description: "{{source_type}} not found"
          - status: 503
            description: "Engine unavailable (e.g., index loading)"

  # --- Metadata ---
  - category: metadata
    endpoints:
      - method: GET
        path: "/{{source_plural}}"
        description: "List available {{source_plural}} with metadata."
        response:
          status: 200
          body:
            "{{source_plural}}":
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  item_count:
                    type: integer
                  last_updated:
                    type: string
                    format: date-time

      - method: GET
        path: "/{{source_plural}}/{id}/{{child_plural}}"
        description: "List {{child_plural}} within a specific {{source_type}}."
        parameters:
          id:
            in: path
            type: string
            required: true
        response:
          status: 200
          body:
            "{{child_plural}}":
              type: array

  # --- Retrieval ---
  - category: retrieval
    endpoints:
      - method: GET
        path: "/{{child_plural}}/{id}/content"
        description: "Retrieve content of a specific {{child_type}}, optionally sliced."
        parameters:
          id:
            in: path
            type: string
            required: true
          source_id:
            in: query
            type: string
            required: true
          slice_start:
            in: query
            type: integer
            description: "Start position (e.g., line number, byte offset)"
          slice_end:
            in: query
            type: integer
            description: "End position"
        response:
          status: 200
          body:
            content:
              type: string
            total_size:
              type: integer
              description: "Total size (lines, bytes, pages)"
            content_type:
              type: string
              description: "Detected content type or language"
            truncated:
              type: boolean

  # --- Health ---
  - category: health
    description: >
      Standard health check endpoints for orchestration (load balancers,
      container platforms, serverless runtimes).
    endpoints:
      - method: GET
        path: /livez
        description: >
          Liveness probe. Returns 200 if the process is running.
        response:
          status: 200
          body:
            status: "ok"

      - method: GET
        path: /readyz
        description: >
          Readiness probe. Returns 200 only when the service is ready
          to accept queries (e.g., index loaded, connections established).
        response:
          status: 200
          body:
            status: "ready"
        error_responses:
          - status: 503
            description: Not yet ready (index loading, dependencies unavailable)

# -----------------------------------------------------------------------
# Pagination
# -----------------------------------------------------------------------
pagination:
  recommended_strategy: cursor-based
  description: >
    Search results should use cursor-based pagination backed by a
    key-value store with TTL (automatic cursor cleanup). Cursors
    are opaque tokens that encode search state server-side.
  design_parameters:
    cursor_ttl: "{{ttl_duration}} (e.g., 15 minutes)"
    storage: "Any key-value store with TTL support"
    cleanup: "Automatic via TTL; no client-side or cron cleanup needed"

# -----------------------------------------------------------------------
# Observability
# -----------------------------------------------------------------------
observability:
  logging:
    format: structured JSON
    recommended_fields:
      - request_id
      - method
      - path
      - status
      - latency_ms
      - source_id
      - client_identity
  metrics:
    format: "{{metrics_format}} (e.g., Prometheus, CloudWatch, StatsD)"
    recommended_counters:
      - "{{domain}}_search_requests_total"
      - "{{domain}}_search_errors_total"
      - "{{domain}}_retrievals_total"
    recommended_histograms:
      - "{{domain}}_search_latency_seconds"
      - "{{domain}}_retrieval_latency_seconds"
